<head>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@100;300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E50914;
            --primary-hover: #b20710;
            --bg-body: #050505;
            --bg-cards: rgba(20, 20, 20, 0.8);
            --bg-nav: rgba(0, 0, 0, 0.9);
            --font-main: 'Roboto', sans-serif;
            --font-title: 'Bebas Neue', cursive;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-body); 
            color: #fff; 
            font-family: var(--font-main); 
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- FOND ANIMÉ TACHES ROUGES --- */
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden; background: #000;
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px); border-radius: 50%; animation: move 20s infinite alternate;
        }
        .blob.one { top: -10%; left: -10%; animation-duration: 15s; }
        .blob.two { bottom: -10%; right: -10%; animation-duration: 25s; background: radial-gradient(circle, rgba(229, 9, 20, 0.1) 0%, rgba(0,0,0,0) 70%); }
        @keyframes move { 
            from { transform: translate(0, 0) scale(1); } 
            to { transform: translate(100px, 100px) scale(1.2); } 
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px;
            background: var(--bg-nav); display: flex; align-items: center;
            padding: 0 4%; z-index: 5000; border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .nav-logo { font-family: var(--font-title); font-size: 2.2rem; color: var(--primary); margin-right: 50px; cursor: pointer; }
        .nav-menu { display: flex; gap: 25px; list-style: none; }
        .nav-menu li { color: rgba(255,255,255,0.6); font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: 0.3s; }
        .nav-menu li:hover, .nav-menu li.active { color: #fff; }

        /* --- PLAYER --- */
        .player-wrapper { margin-top: 100px; padding: 0 4%; display: flex; flex-direction: column; align-items: center; }
        #video-container {
            width: 60%; max-width: 900px; aspect-ratio: 16/9; background: #000;
            border-radius: 8px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #video-container.fullscreen { width: 100%; max-width: none; }
        video { width: 100%; height: 100%; border-radius: 8px; }

        .player-controls {
            width: 60%; max-width: 900px; display: flex; justify-content: space-between;
            align-items: center; margin-top: 15px; background: rgba(17,17,17,0.8); padding: 15px 20px; border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .quality-btn {
            background: transparent; border: 1px solid #444; color: #aaa;
            padding: 5px 12px; font-size: 0.7rem; border-radius: 4px; cursor: pointer; margin-left: 5px;
        }
        .quality-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* --- GRILLES & CARDS --- */
        .section-container { padding: 40px 4%; }
        .section-title { font-size: 1.8rem; margin-bottom: 25px; font-weight: 800; border-left: 4px solid var(--primary); padding-left: 15px; }
        .grid-layout { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }

        .item-card {
            background: var(--bg-cards); border-radius: 8px; overflow: hidden;
            transition: 0.4s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .item-card:hover { transform: translateY(-10px); border-color: var(--primary); background: rgba(40,40,40,0.9); }
        .card-img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 15px; }
        
        /* TAG FILMS / SERIES */
        .tag {
            position: absolute; top: 10px; right: 10px; padding: 3px 8px;
            font-size: 0.6rem; font-weight: 900; text-transform: uppercase;
            border-radius: 3px; background: var(--primary);
        }
        .tag.serie { background: #007bff; }

        /* --- WEB LINKS --- */
        .web-link-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(20,20,20,0.8); padding: 20px; border-radius: 10px; margin-bottom: 15px;
            border-left: 5px solid var(--primary);
        }

        /* --- AUTH --- */
        #auth-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: #000; display: flex; align-items: center; justify-content: center;
        }
        .login-container { width: 100%; max-width: 400px; padding: 40px; text-align: center; }

</head>

            document.getElementById('playing-title').innerText = name;
            if (Hls.isSupported()) {
                hls.destroy();
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
